spark {
  app-name = "IDS-Spark-Job"
  master = "local[2]"
  checkpoint-dir = "/opt/spark/app/checkpoint"
  model-path = "/opt/spark/app/models/streaming-model"
  training-data-path = "/opt/spark/app/training_data"
  batch-duration-seconds = 10
}

kafka {
  bootstrap-servers = "kafka:9092"
  topic = "network-traffic"
  starting-offsets = "latest"
  max-offsets-per-trigger = 5000
  fail-on-data-loss = false
}

postgres {
  url = "jdbc:postgresql://postgres:5432/ids_db?reWriteBatchedInserts=true&defaultRowFetchSize=500"
  user = "ids_user"
  password = "ids_password"
  driver = "org.postgresql.Driver"
}

geoip {
  db-path = "/opt/spark/app/data/GeoLite2-City.mmdb"
  default-latitude = 33.5731
  default-longitude = -7.5898
}

ml {
  feature-columns = [
    "flow_duration", "total_fwd_packets", "total_backward_packets",
    "fwd_packet_length_max", "fwd_packet_length_min", "fwd_packet_length_mean",
    "bwd_packet_length_max", "bwd_packet_length_min", "bwd_packet_length_mean",
    "flow_bytes_per_sec", "flow_packets_per_sec",
    "fwd_iat_total", "fwd_iat_mean", "bwd_iat_total", "bwd_iat_mean",
    "fwd_psh_flags", "bwd_psh_flags", "fwd_urg_flags", "bwd_urg_flags",
    "fin_flag_count", "syn_flag_count", "rst_flag_count", "psh_flag_count", "ack_flag_count", "urg_flag_count",
    "packet_length_mean", "packet_length_std", "packet_length_variance",
    "avg_packet_size", "avg_fwd_segment_size", "avg_bwd_segment_size",
    "subflow_fwd_packets", "subflow_fwd_bytes", "subflow_bwd_packets", "subflow_bwd_bytes",
    "init_win_bytes_forward", "init_win_bytes_backward", "active_mean", "idle_mean"
  ]
  label-column = "label"
  prediction-column = "prediction"
  num-trees = 25
  max-depth = 8
  impurity = "gini"
  feature-subset-strategy = "auto"
  seed = 42
}
